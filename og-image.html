<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kamran Ikram - OG Image</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
    }
    
    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      padding: 50px;
      position: relative;
      overflow: hidden;
    }
    
    /* Animated background circles */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(145, 94, 255, 0.1);
    }
    
    .bg-circle-1 {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
    }
    
    .bg-circle-2 {
      width: 300px;
      height: 300px;
      bottom: -50px;
      left: -50px;
    }
    
    .bg-circle-3 {
      width: 200px;
      height: 200px;
      top: 50%;
      left: 30%;
      background: rgba(145, 94, 255, 0.05);
    }
    
    .content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      z-index: 10;
    }
    
    .left-section {
      flex: 1;
      padding-right: 40px;
    }
    
    .greeting {
      color: #915EFF;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    .name {
      font-size: 72px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .name span {
      color: #915EFF;
    }
    
    .title {
      font-size: 32px;
      color: #aaa6c3;
      font-weight: 600;
      margin-bottom: 25px;
    }
    
    .skills {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    
    .skill-tag {
      background: rgba(145, 94, 255, 0.2);
      border: 2px solid #915EFF;
      color: #ffffff;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 500;
    }
    
    .website {
      color: #915EFF;
      font-size: 20px;
      font-weight: 600;
    }
    
    .right-section {
      position: relative;
    }
    
    .profile-frame {
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: linear-gradient(135deg, #915EFF, #7B4FD8, #5B3BA8);
      padding: 8px;
      box-shadow: 0 20px 60px rgba(145, 94, 255, 0.4);
    }
    
    .profile-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .profile-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2a2a4e, #1a1a2e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .initials {
      font-size: 120px;
      font-weight: 800;
      color: #915EFF;
      text-shadow: 4px 4px 8px rgba(0,0,0,0.5);
    }
    
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .decorative-dots {
      position: absolute;
      bottom: 30px;
      right: 30px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .dot {
      width: 10px;
      height: 10px;
      background: #915EFF;
      border-radius: 50%;
      opacity: 0.5;
    }
    
    .location-badge {
      position: absolute;
      bottom: 40px;
      left: 50px;
      background: rgba(145, 94, 255, 0.15);
      border: 1px solid rgba(145, 94, 255, 0.3);
      padding: 10px 25px;
      border-radius: 30px;
      color: #ffffff;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .location-badge::before {
      content: "📍";
    }
  </style>
</head>
<body>
  <div class="og-container">
    <!-- Background decorations -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
    
    <div class="content">
      <div class="left-section">
        <div class="greeting">Hi, I'm</div>
        <h1 class="name">Kamran <span>Ikram</span></h1>
        <div class="title">MERN Stack Developer</div>
        <div class="skills">
          <span class="skill-tag">React.js</span>
          <span class="skill-tag">Node.js</span>
          <span class="skill-tag">MongoDB</span>
          <span class="skill-tag">Express.js</span>
        </div>
        <div class="website">kamranikramofficial.me</div>
      </div>
      
      <div class="right-section">
        <div class="profile-frame">
          <div class="profile-inner">
            <!-- Replace src with actual profile image path -->
            <!-- <img src="profile.png" alt="Kamran Ikram" class="profile-img"> -->
            <div class="profile-placeholder">
              <span class="initials">KI</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="location-badge">Karachi, Pakistan</div>
    
    <div class="decorative-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</body>
</html>
